aid: travelers-companies
name: The Travelers Companies
kind: company
description: >-
  The Travelers Companies, Inc. (NYSE: TRV) is a leading United States property
  and casualty (P&C) insurance carrier providing auto, home, and business
  insurance to individuals, agencies, businesses, government units, and
  associations. Travelers is a component of the Dow Jones Industrial Average,
  generated approximately $48.83 billion in revenue in 2025, holds roughly
  $143.7 billion in total assets, and employs approximately 34,000 people plus
  15,000 independent agents and brokers across the United States, Canada, the
  United Kingdom, and the Republic of Ireland. The company operates through
  three reportable segments — Business Insurance, Bond & Specialty Insurance,
  and Personal Insurance — distributing primarily through a network of
  independent agents and brokers, and through direct-to-consumer channels for
  segments of its personal lines. Travelers has a developer portal at
  developer.travelers.com that surfaces APIs intended for appointed agents,
  agency-management-system (AMS) vendors, and integration partners; the portal
  is gated (Salesforce Experience Cloud) and individual API specifications,
  endpoints, and pricing are not publicly published. The company also publishes
  the IntelliDrive and IntelliDrivePlus telematics mobile apps used to score
  personal-auto driving behavior for rating credits.
