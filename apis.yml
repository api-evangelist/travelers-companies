  - type: DeveloperPortal
    url: https://developer.travelers.com
    name: Travelers Developer Portal
    description: >-
      Gated developer portal (Salesforce Experience Cloud) used to onboard
      appointed agents, agency-management-system vendors, and integration
      partners onto Travelers' partner APIs. Specifications, endpoints, and
      pricing are not publicly published; access requires an appointment or
      partnership agreement with Travelers.
  - type: GitHubOrganization
    url: https://github.com/travelers
    name: Travelers Technology on GitHub
    description: >-
      Travelers Technology organization on GitHub (opensource@travelers.com,
      Hartford, CT). The organization currently exposes two public
      repositories — KubUI (JavaScript, last updated 2019) and cloud-automation
      (Python fork of Dynatrace observability content, last updated 2023) —
      and no language SDKs or developer tools.
  - type: GitHubRepository
    url: https://github.com/travelers/KubUI
    name: KubUI
    description: Public Travelers JavaScript repository (last updated Jan 2019).
  - type: GitHubRepository
    url: https://github.com/travelers/cloud-automation
    name: cloud-automation
    description: >-
      Public Travelers fork of Dynatrace Cloud Automation observability content
      (Python, last updated Jan 2023).
  - type: MobileApp
    url: https://www.travelers.com/intellidrive
    name: Travelers IntelliDrive
    description: >-
      90-day smartphone-based telematics program that captures braking,
      acceleration, speed, time of day, and phone distraction to score
      personal-auto driving behavior; safe driving can yield up to 30% savings
      at renewal. iOS 14+ and Android 10+.
  - type: MobileApp
    url: https://www.travelers.com/intellidrive
    name: IntelliDrivePlus
    description: >-
      Continuous (not 90-day) version of the IntelliDrive telematics program,
      available in select states.
